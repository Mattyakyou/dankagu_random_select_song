<!DOCTYPE html>
<link rel="stylesheet" href="wow.css">
<meta charset="UTF-8">

<body class="all">
    <div class="text">
        <table class="table1">
            <thead>
                <tr>
                    <th class="pack">収録パック</th>
                    <th>曲名</th>
                    <th class="diff">E</th>
                    <th class="diff">N</th>
                    <th class="diff">H</th>
                    <th class="diff">L</th>
                    <th class="bpm">BPM</th>
                </tr>
            </thead>
            <tbody>
                <script src="display.js"></script>
            </tbody>
        </table>
        <div class="select">
            <div class="checkbox_raw">
                購入しているパックを入力
                <button class="all_on">全部ON</button>
                <button class="all_off">全部OFF</button>
                <div class="checkbox">
                    <script src="checkbox.js"></script>
                </div>
            </div>
            <button class="generate" type="button">生成</button>
            <div>
                Lunaticの難易度下限：
                <input type="number" class="L_diff" name="L_diff" min="19" max="36" value="19"/>
            </div>
            <table class="table2">
                <thead>
                    <tr>
                        <th class="pack">収録パック</th>
                        <th>曲名</th>
                        <th class="diff">E</th>
                        <th class="diff">N</th>
                        <th class="diff">H</th>
                        <th class="diff">L</th>
                        <th class="bpm">BPM</th>
                    </tr>
                </thead>
                <tbody class="table2-tbody">
                    <script src="select.js"></script>
                </tbody>
            </table>
        </div>
    </div>
</body>
